services:
  - type: web
    name: sadk-auth
    env: node
    buildCommand: npm install
    startCommand: node server_fixed.js
    disk:
      name: sadk-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /data/sadk.db
      - key: NODE_ENV
        value: production
